name: Keep Neo4j Awake

on:
  schedule:
    # Runs at midnight every 2 days
    - cron: "0 0 */2 * *"
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  ping_database:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Neo4j Driver
        run: pip install neo4j

      - name: Ping Neo4j
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          python -c "
          from neo4j import GraphDatabase
          import os
          driver = GraphDatabase.driver(os.environ['NEO4J_URI'], auth=(os.environ['NEO4J_USERNAME'], os.environ['NEO4J_PASSWORD']))
          driver.execute_query('RETURN 1') # A tiny query just to trigger activity
          driver.close()
          print('Neo4j successfully pinged!')
          "