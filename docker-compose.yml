services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password12345
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  ui:
    build: .
    command: streamlit run streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      - neo4j
    ports:
      - "8501:8501"

  api:
    build: .
    command: uvicorn graphrag_studio.api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      - neo4j
    ports:
      - "8000:8000"

volumes:
  neo4j_data:
